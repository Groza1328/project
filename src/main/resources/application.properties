spring.application.name=sibmobile

# Railway передаёт PORT; локально по умолчанию 8080
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# prod на Railway, local на компьютере
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Почта — только через переменные окружения (секреты не храним в репозитории)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
spring.mail.properties.mail.smtp.connectionpool=true
spring.mail.properties.mail.smtp.connectionpoolsize=5
spring.mail.properties.mail.smtp.quitwait=false

# Actuator для healthcheck Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
