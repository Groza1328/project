<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СибМобиль - Восстановление пароля</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-sib">Сиб</span><span class="logo-mobile">Мобиль</span>
            </div>
            <h2>Восстановление пароля</h2>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <p class="verify-info">
                Укажите email, на который зарегистрирован аккаунт. Мы отправим одноразовый код для смены пароля.
            </p>

            <form th:action="@{/forgot-password}" method="post" id="forgotForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           th:value="${submittedEmail}">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Отправить код</button>
            </form>

            <div class="auth-footer">
                <p><a th:href="@{/login}">Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function () {
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Отправка…';
        });
    </script>
</body>
</html>
