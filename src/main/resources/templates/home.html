<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СибМобиль - Каршеринг</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="main-page" id="body">
    <!-- Hero Section with Background -->
    <div class="hero" id="hero">
        <div class="hero-bg day" id="hero-bg-day"></div>
        <div class="hero-bg night" id="hero-bg-night"></div>
        
        <!-- Header -->
        <header class="main-header">
            <button class="theme-toggle" id="themeToggle" title="Переключить тему">
                <span class="sun-icon">☀️</span>
                <span class="moon-icon">🌙</span>
            </button>
            <nav class="nav-menu">
                <a th:href="@{/fleet}" class="nav-btn">Заказать</a>
                <a th:href="@{/tariffs}" class="nav-btn">О тарифах</a>
                <a href="#help" class="nav-btn">Помощь</a>
                <form th:action="@{/logout}" method="post" style="display:inline;margin-left:16px;">
                    <button type="submit" class="nav-btn">Выход</button>
                </form>
            </nav>
        </header>
        
        <!-- Hero Content -->
        <div class="hero-content">
            <h1 class="hero-title">
                СибМобиль - здесь про<br>
                выгоду и надежность.
            </h1>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="main-footer" id="footer">
        <div class="footer-left">
            <p class="footer-title">Связаться с нами</p>
            <a href="mailto:karshering@gmail.com" class="footer-email">karshering@gmail.com</a>
        </div>
        <div class="footer-right">
            <a href="/privacy">Пользовательское соглашение</a>
            <a href="#promotions">Акции</a>
            <a href="https://t.me/+hfgHO8ic8YM0OTA6" target="_blank" rel="noopener noreferrer">Наш Telegram</a>
        </div>
    </footer>
    
    <script>
        const body = document.getElementById('body');
        const hero = document.getElementById('hero');
        const footer = document.getElementById('footer');
        const themeToggle = document.getElementById('themeToggle');
        const heroBgDay = document.getElementById('hero-bg-day');
        const heroBgNight = document.getElementById('hero-bg-night');
        
        // Тема по умолчанию = как в системе / браузере
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        let isDark = mediaQuery.matches;
        
        function updateTheme() {
            if (isDark) {
                body.classList.add('dark-theme');
                heroBgDay.style.opacity = '0';
                heroBgNight.style.opacity = '1';
            } else {
                body.classList.remove('dark-theme');
                heroBgDay.style.opacity = '1';
                heroBgNight.style.opacity = '0';
            }
        }
        
        updateTheme();

        // Автообновление темы при смене темы в системе / браузере
        mediaQuery.addEventListener('change', (e) => {
            isDark = e.matches;
            updateTheme();
        });

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            updateTheme();
        });
    </script>
</body>
</html>
