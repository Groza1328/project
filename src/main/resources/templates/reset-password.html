<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СибМобиль - Смена пароля</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-sib">Сиб</span><span class="logo-mobile">Мобиль</span>
            </div>
            <h2>Смена пароля</h2>

            <p class="verify-info">
                На почту <strong th:text="${email}"></strong> отправлен 6-значный код.
                Введите код и новый пароль.
            </p>

            <div th:if="${codeSent}" class="alert alert-success">Код отправлен на вашу почту.</div>
            <div th:if="${resendSuccess}" class="alert alert-success" th:text="${resendSuccess}"></div>
            <div th:if="${emailWarning}" class="alert alert-error" th:text="${emailWarning}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/reset-password}" method="post">
                <div class="form-group">
                    <label for="code">Код из письма</label>
                    <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}"
                           placeholder="000000" required autofocus class="code-input"
                           inputmode="numeric" autocomplete="one-time-code">
                </div>
                <div class="form-group">
                    <label for="password">Новый пароль</label>
                    <input type="password" id="password" name="password" required minlength="6"
                           autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="passwordConfirm">Подтверждение пароля</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" required minlength="6"
                           autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">Сохранить новый пароль</button>
            </form>

            <p class="verify-hint">Код не пришёл?</p>
            <div class="verify-actions">
                <form th:action="@{/reset-password/resend}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-secondary">Отправить код повторно</button>
                </form>
                <a th:href="@{/forgot-password}" class="btn btn-outline">Другой email</a>
            </div>

            <div class="auth-footer">
                <p><a th:href="@{/login}">Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
</body>
</html>
