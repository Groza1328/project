<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СибМобиль - Подтверждение почты</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-sib">Сиб</span><span class="logo-mobile">Мобиль</span>
            </div>
            <h2>Подтверждение email</h2>
            
            <p class="verify-info">На почту <strong th:text="${email}"></strong> отправлен 6-значный код. Введите его ниже.</p>
            <p class="verify-hint">Если письма нет 2–3 минуты, проверьте «Спам» или нажмите «Отправить код повторно».</p>
            
            <div th:if="${justRegistered}" class="alert alert-success">Регистрация принята. Введите код из письма ниже.</div>
            <div th:if="${emailInfo}" class="alert alert-success" th:text="${emailInfo}"></div>
            <div th:if="${resendSuccess}" class="alert alert-success" th:text="${resendSuccess}"></div>
            <div th:if="${emailWarning}" class="alert alert-error" th:text="${emailWarning}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/verify}" method="post">
                <div class="form-group">
                    <label for="code">Код из письма</label>
                    <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}" 
                           placeholder="000000" required autofocus class="code-input" inputmode="numeric" autocomplete="one-time-code"
                           th:value="${submittedCode}">
                </div>
                <button type="submit" class="btn btn-primary">Подтвердить</button>
            </form>
            
            <p class="verify-hint">Код не пришёл?</p>
            <div class="verify-actions">
                <form th:action="@{/verify/resend}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-secondary">Отправить код повторно</button>
                </form>
                <a th:href="@{/verify/change-email}" class="btn btn-outline">Изменить почту</a>
                <a th:href="@{/verify/cancel}" class="btn btn-outline">Отменить</a>
            </div>
        </div>
    </div>
</body>
</html>
